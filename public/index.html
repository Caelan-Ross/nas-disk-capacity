<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueNAS Pool Bar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container" id="root">
    <div class="label-row">
      <span class="label-pool" id="pool-name">—</span>
      <span class="label-pct" id="percent-label">—%</span>
      <span class="label-used" id="used-label">— / —</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar" style="width:0%;"></div>
    </div>
  </div>
  <script src="widget.js"></script>
</body>
</html>
